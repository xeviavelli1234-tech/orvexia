name: CI

# Corre tsc + lint + tests en cada push y PR. Mantiene la barra de calidad
# sin depender de que alguien recuerde correrlos en local.
#
# Tiempo objetivo: < 90 s.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Si llegan varios commits seguidos en la misma rama, cancela los anteriores
# para no gastar minutos en builds ya obsoletos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: tsc + lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # `npm ci` ejecuta `postinstall` que corre `prisma generate`. Sin BD
      # real disponible, generate funciona contra el schema y no toca red.
      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test
