name: Actualizar precios y stock

on:
  schedule:
    # Cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: # también ejecutable manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Generar cliente Prisma
        run: npx prisma generate

      - name: Ejecutar scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/scrape-prices.ts

      - name: Actualizar precios El Corte Ingles (feed AWIN)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AWIN_API_KEY: ${{ secrets.AWIN_API_KEY }}
          AWIN_ECI_FEED_ID: ${{ secrets.AWIN_ECI_FEED_ID }}
        run: npx tsx scripts/update-prices-awin.ts
